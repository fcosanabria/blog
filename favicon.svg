<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Terminal dark background -->
  <rect width="32" height="32" rx="5" fill="#1e1e1e"/>
  <!-- Caret / prompt arrow -->
  <polyline points="5,11 12,16 5,21" stroke="#50fa7b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor underscore -->
  <line x1="15" y1="21" x2="26" y2="21" stroke="#50fa7b" stroke-width="2.5" stroke-linecap="round"/>
</svg>
